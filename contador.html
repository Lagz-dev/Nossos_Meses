<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador do Nosso Amor ❤️</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --rose: #f7c5c5;
            --rose-mid: #f0a0a0;
            --rose-deep: #d45c7a;
            --cream: #fff7f7;
            --text: #3a1a22;
            --text-mid: #7a4455;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, #fff0f3, #fde8e8, #ffd6e0);
            color: var(--text);
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        .letter {
            max-width: 700px;
            margin: 120px auto 0;
            line-height: 2;
            font-size: 1.05rem;
            color: var(--text-mid);
        }

        .letter p {
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        h1 span {
            color: var(--rose-deep);
            font-style: italic;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.7);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .number {
            font-size: 2.5rem;
            color: var(--rose-deep);
            font-weight: bold;
        }

        .label {
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #7a4455;
            margin-top: 5px;
        }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 14px 32px;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--rose-deep), #b03060);
            color: white;
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(212, 92, 122, 0.35);
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 40px rgba(212, 92, 122, 0.45);
        }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {

            body {
                align-items: flex-start;
                padding: 20px 10px;
                height: auto;
            }

            .container {
                padding: 20px 10px;
            }

            h1 {
                font-size: 2.2rem;
            }

            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .card {
                padding: 14px;
            }

            .number {
                font-size: 1.8rem;
            }

            .label {
                font-size: 0.65rem;
            }

            .letter {
                font-size: 0.95rem;
                margin-top: 40px;
            }

            .btn {
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Nosso <span>Tempo</span> ❤️</h1>

        <div class="grid">
            <div class="card">
                <div class="number" id="y">0</div>
                <div class="label">Anos</div>
            </div>

            <div class="card">
                <div class="number" id="mo">0</div>
                <div class="label">Meses</div>
            </div>

            <div class="card">
                <div class="number" id="d">0</div>
                <div class="label">Dias</div>
            </div>

            <div class="card">
                <div class="number" id="h">0</div>
                <div class="label">Horas</div>
            </div>

            <div class="card">
                <div class="number" id="m">0</div>
                <div class="label">Minutos</div>
            </div>

            <div class="card">
                <div class="number" id="s">0</div>
                <div class="label">Segundos</div>
            </div>
        </div>
        </br>
        <p class="letter">
            Este contador mostra o tempo que passou desde a nossa primeira vez juntos. <br>

        </p>

        <a class="btn" href="./index.html">Voltar 💌</a>

    </div>

    <script>
        const start = new Date(2025, 5, 25);

        function update() {

            const now = new Date();

            let years = now.getFullYear() - start.getFullYear();
            let months = now.getMonth() - start.getMonth();
            let days = now.getDate() - start.getDate();

            if (days < 0) {
                months--;
                days += 30;
            }

            if (months < 0) {
                years--;
                months += 12;
            }

            const diff = now - start;

            const hours = Math.floor(diff / 3600000);
            const minutes = Math.floor(diff / 60000);
            const seconds = Math.floor(diff / 1000);

            document.getElementById("y").textContent = years;
            document.getElementById("mo").textContent = months;
            document.getElementById("d").textContent = days;
            document.getElementById("h").textContent = hours;
            document.getElementById("m").textContent = minutes;
            document.getElementById("s").textContent = seconds;
        }

        setInterval(update, 1000);
        update();
    </script>

</body>

</html>
